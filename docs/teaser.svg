<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Segoe UI', Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4332"/>
      <stop offset="50%" style="stop-color:#2D6A4F"/>
      <stop offset="100%" style="stop-color:#1B4332"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#52B788;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#40916C;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="soilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B4423"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </linearGradient>
    <linearGradient id="myceliumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#95D5B2"/>
      <stop offset="100%" style="stop-color:#74C69D"/>
    </linearGradient>
    <radialGradient id="energyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4FC79;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#52B788;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="30" height="30">
      <circle cx="15" cy="15" r="0.8" fill="#52B788" opacity="0.15"/>
    </pattern>
    <clipPath id="sensorClip">
      <rect x="440" y="200" width="200" height="280" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="430"/>
    <line x1="400" y1="0" x2="1200" y2="230"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="0" y1="400" x2="600" y2="630"/>
  </g>

  <!-- Glow orb behind sensor -->
  <ellipse cx="540" cy="340" rx="220" ry="200" fill="url(#energyGlow)" opacity="0.3"/>

  <!-- ═══════════ LEFT SIDE: Text ═══════════ -->
  <text x="80" y="140" fill="#95D5B2" font-size="13" font-weight="600" letter-spacing="4" text-transform="uppercase" opacity="0.8">BIO-DEGRADABLE ENERGY</text>

  <text x="80" y="210" fill="white" font-size="62" font-weight="800" letter-spacing="-1" line-height="1.05">MykoVolt</text>
  <text x="80" y="268" fill="#B7E4C7" font-size="62" font-weight="800" letter-spacing="-1" opacity="0.4">MykoVolt</text>

  <line x1="80" y1="290" x2="340" y2="290" stroke="#52B788" stroke-width="2" opacity="0.5"/>

  <text x="80" y="330" fill="#D8F3DC" font-size="20" font-weight="400" opacity="0.9">The Fungal Battery for</text>
  <text x="80" y="360" fill="white" font-size="22" font-weight="600">Precision Agriculture</text>

  <text x="80" y="400" fill="#B7E4C7" font-size="14" font-weight="400" opacity="0.7">Biodegradable soil sensors &mdash;</text>
  <text x="80" y="422" fill="#B7E4C7" font-size="14" font-weight="400" opacity="0.7">no e-waste, no recycling needed.</text>

  <!-- Key stats -->
  <g transform="translate(80, 460)">
    <rect x="0" y="0" width="90" height="60" rx="10" fill="#2D6A4F" stroke="#52B788" stroke-width="1" opacity="0.6"/>
    <text x="45" y="28" fill="#D4FC79" font-size="20" font-weight="700" text-anchor="middle">7</text>
    <text x="45" y="46" fill="#B7E4C7" font-size="10" text-anchor="middle">Days Runtime</text>

    <rect x="105" y="0" width="90" height="60" rx="10" fill="#2D6A4F" stroke="#52B788" stroke-width="1" opacity="0.6"/>
    <text x="150" y="28" fill="#D4FC79" font-size="20" font-weight="700" text-anchor="middle">90%</text>
    <text x="150" y="46" fill="#B7E4C7" font-size="10" text-anchor="middle">Compostable</text>

    <rect x="210" y="0" width="90" height="60" rx="10" fill="#2D6A4F" stroke="#52B788" stroke-width="1" opacity="0.6"/>
    <text x="255" y="28" fill="#D4FC79" font-size="20" font-weight="700" text-anchor="middle">&euro;0.15</text>
    <text x="255" y="46" fill="#B7E4C7" font-size="10" text-anchor="middle">per Sensor</text>
  </g>

  <!-- ═══════════ CENTER: Sensor Illustration ═══════════ -->
  <g filter="url(#softShadow)">
    <!-- Sensor body -->
    <rect x="440" y="200" width="200" height="280" rx="24" fill="url(#soilGrad)" stroke="#8D6E63" stroke-width="1.5"/>

    <!-- Soil texture overlay -->
    <g clip-path="url(#sensorClip)" opacity="0.15">
      <circle cx="470" cy="240" r="4" fill="#A1887F"/>
      <circle cx="510" cy="260" r="3" fill="#8D6E63"/>
      <circle cx="590" cy="230" r="3.5" fill="#A1887F"/>
      <circle cx="610" cy="280" r="2.5" fill="#8D6E63"/>
      <circle cx="480" cy="310" r="3" fill="#A1887F"/>
      <circle cx="560" cy="300" r="4" fill="#8D6E63"/>
      <circle cx="620" cy="350" r="3" fill="#A1887F"/>
      <circle cx="470" cy="380" r="2.5" fill="#8D6E63"/>
      <circle cx="530" cy="400" r="3.5" fill="#A1887F"/>
      <circle cx="600" cy="420" r="2" fill="#8D6E63"/>
    </g>

    <!-- Mycelium network (visible through soil) -->
    <g opacity="0.35" clip-path="url(#sensorClip)">
      <path d="M460,220 Q490,250 520,230 Q550,210 580,240 Q610,270 600,300 Q590,330 560,350 Q530,370 500,360 Q470,350 460,320 Q450,290 460,260 Z" fill="none" stroke="#95D5B2" stroke-width="1.5"/>
      <path d="M480,250 Q510,280 540,260 Q570,240 590,270 Q600,300 580,330 Q560,360 530,370" fill="none" stroke="#74C69D" stroke-width="1"/>
      <path d="M500,300 Q530,320 560,310 Q590,300 610,320" fill="none" stroke="#95D5B2" stroke-width="0.8"/>
      <path d="M470,340 Q500,360 530,350 Q560,340 590,360" fill="none" stroke="#74C69D" stroke-width="0.8"/>

      <!-- Fungal cells -->
      <circle cx="490" cy="250" r="6" fill="#95D5B2" opacity="0.5"/>
      <circle cx="490" cy="250" r="3" fill="#B7E4C7" opacity="0.7"/>
      <circle cx="540" cy="270" r="5" fill="#95D5B2" opacity="0.5"/>
      <circle cx="540" cy="270" r="2.5" fill="#B7E4C7" opacity="0.7"/>
      <circle cx="580" cy="300" r="7" fill="#95D5B2" opacity="0.5"/>
      <circle cx="580" cy="300" r="3.5" fill="#B7E4C7" opacity="0.7"/>
      <circle cx="520" cy="340" r="5" fill="#95D5B2" opacity="0.5"/>
      <circle cx="520" cy="340" r="2.5" fill="#B7E4C7" opacity="0.7"/>
      <circle cx="470" cy="310" r="6" fill="#95D5B2" opacity="0.5"/>
      <circle cx="470" cy="310" r="3" fill="#B7E4C7" opacity="0.7"/>
      <circle cx="560" cy="350" r="5" fill="#95D5B2" opacity="0.5"/>
      <circle cx="560" cy="350" r="2.5" fill="#B7E4C7" opacity="0.7"/>
      <circle cx="610" cy="330" r="4" fill="#95D5B2" opacity="0.5"/>
      <circle cx="610" cy="330" r="2" fill="#B7E4C7" opacity="0.7"/>
    </g>

    <!-- Internal PCB layer hint -->
    <rect x="470" y="290" width="140" height="100" rx="12" fill="#1B5E20" opacity="0.3"/>
    <!-- MCU chip -->
    <rect x="510" y="315" width="30" height="22" rx="3" fill="#263238" opacity="0.5"/>
    <!-- Electrode traces -->
    <g opacity="0.25">
      <rect x="480" y="305" width="4" height="40" rx="1" fill="#FFC107"/>
      <rect x="492" y="310" width="4" height="30" rx="1" fill="#FFC107"/>
      <rect x="504" y="305" width="4" height="40" rx="1" fill="#FFC107"/>
      <rect x="555" y="305" width="4" height="40" rx="1" fill="#FFC107"/>
      <rect x="567" y="310" width="4" height="30" rx="1" fill="#FFC107"/>
      <rect x="579" y="305" width="4" height="40" rx="1" fill="#FFC107"/>
      <rect x="591" y="310" width="4" height="30" rx="1" fill="#FFC107"/>
    </g>

    <!-- Energy glow from battery -->
    <ellipse cx="540" cy="380" rx="80" ry="30" fill="url(#energyGlow)" opacity="0.4"/>

    <!-- "LIVE" indicator -->
    <circle cx="475" cy="228" r="4" fill="#52B788" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="485" y="232" fill="#95D5B2" font-size="9" font-weight="600" opacity="0.8">LIVE</text>

    <!-- Compostable badge -->
    <rect x="480" y="450" width="120" height="20" rx="10" fill="#52B788" opacity="0.8"/>
    <text x="540" y="464" fill="white" font-size="10" text-anchor="middle" font-weight="700">COMPOSTABLE</text>
  </g>

  <!-- Signal waves from sensor -->
  <g fill="none" stroke="#52B788" stroke-width="1.5" opacity="0.4">
    <path d="M650,300 Q670,280 650,260">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M660,310 Q690,280 660,250">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M670,320 Q710,280 670,240">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  <text x="685" y="245" fill="#74C69D" font-size="10" opacity="0.6">LoRa 868 MHz</text>

  <!-- ═══════════ RIGHT SIDE: Features ═══════════ -->
  <g transform="translate(760, 180)">
    <!-- Feature cards -->
    <g>
      <rect x="0" y="0" width="340" height="52" rx="10" fill="#2D6A4F" opacity="0.5"/>
      <circle cx="30" cy="26" r="14" fill="#52B788" opacity="0.3"/>
      <text x="30" y="31" fill="#D4FC79" font-size="14" text-anchor="middle">1</text>
      <text x="56" y="22" fill="white" font-size="13" font-weight="600">Fungal Bio-Battery (MFC)</text>
      <text x="56" y="40" fill="#B7E4C7" font-size="11" opacity="0.7">Trametes pubescens — 520 µW from organic waste</text>
    </g>

    <g transform="translate(0, 62)">
      <rect x="0" y="0" width="340" height="52" rx="10" fill="#2D6A4F" opacity="0.5"/>
      <circle cx="30" cy="26" r="14" fill="#52B788" opacity="0.3"/>
      <text x="30" y="31" fill="#D4FC79" font-size="14" text-anchor="middle">2</text>
      <text x="56" y="22" fill="white" font-size="13" font-weight="600">Capacitive Soil Moisture Sensor</text>
      <text x="56" y="40" fill="#B7E4C7" font-size="11" opacity="0.7">Fringe-field measurement — 100 kHz, ±1% accuracy</text>
    </g>

    <g transform="translate(0, 124)">
      <rect x="0" y="0" width="340" height="52" rx="10" fill="#2D6A4F" opacity="0.5"/>
      <circle cx="30" cy="26" r="14" fill="#52B788" opacity="0.3"/>
      <text x="30" y="31" fill="#D4FC79" font-size="14" text-anchor="middle">3</text>
      <text x="56" y="22" fill="white" font-size="13" font-weight="600">Ultra-Low-Power MCU</text>
      <text x="56" y="40" fill="#B7E4C7" font-size="11" opacity="0.7">STM32L0 — 0.4 µA sleep, FRAM ring buffer</text>
    </g>

    <g transform="translate(0, 186)">
      <rect x="0" y="0" width="340" height="52" rx="10" fill="#2D6A4F" opacity="0.5"/>
      <circle cx="30" cy="26" r="14" fill="#52B788" opacity="0.3"/>
      <text x="30" y="31" fill="#D4FC79" font-size="14" text-anchor="middle">4</text>
      <text x="56" y="22" fill="white" font-size="13" font-weight="600">LoRa / NFC Communication</text>
      <text x="56" y="40" fill="#B7E4C7" font-size="11" opacity="0.7">Phase 1: NFC (passive) — Phase 2: LoRa 2+ km</text>
    </g>

    <g transform="translate(0, 248)">
      <rect x="0" y="0" width="340" height="52" rx="10" fill="#2D6A4F" opacity="0.5"/>
      <circle cx="30" cy="26" r="14" fill="#52B788" opacity="0.3"/>
      <text x="30" y="31" fill="#D4FC79" font-size="14" text-anchor="middle">5</text>
      <text x="56" y="22" fill="white" font-size="13" font-weight="600">100% compostable</text>
      <text x="56" y="40" fill="#B7E4C7" font-size="11" opacity="0.7">Zero e-waste — sensor decomposes in the soil</text>
    </g>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="595" fill="#74C69D" font-size="13" text-anchor="middle" letter-spacing="3" opacity="0.6">THE FIRST BIODEGRADABLE SOIL SENSOR TAG</text>

  <!-- Subtle corner accents -->
  <line x1="30" y1="30" x2="30" y2="60" stroke="#52B788" stroke-width="2" opacity="0.3"/>
  <line x1="30" y1="30" x2="60" y2="30" stroke="#52B788" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1170" y2="570" stroke="#52B788" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="600" x2="1140" y2="600" stroke="#52B788" stroke-width="2" opacity="0.3"/>
</svg>