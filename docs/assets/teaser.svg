<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Segoe UI', -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D2818"/>
      <stop offset="35%" style="stop-color:#1B4332"/>
      <stop offset="70%" style="stop-color:#2D6A4F"/>
      <stop offset="100%" style="stop-color:#1B4332"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#52B788"/>
      <stop offset="100%" style="stop-color:#D4FC79"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="65%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#52B788;stop-opacity:0.12"/>
      <stop offset="60%" style="stop-color:#52B788;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#52B788;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="energyPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4FC79;stop-opacity:0.25"/>
      <stop offset="60%" style="stop-color:#52B788;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#52B788;stop-opacity:0"/>
    </radialGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="sensorClip">
      <rect x="700" y="150" width="180" height="330" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glowBg)"/>

  <!-- Subtle ambient glow right side -->
  <circle cx="790" cy="315" r="300" fill="url(#energyPulse)"/>

  <!-- ═══════ LEFT: Content ═══════ -->

  <!-- Label badge -->
  <rect x="80" y="100" width="180" height="30" rx="15" fill="#52B788" opacity="0.15"/>
  <text x="170" y="120" fill="#52B788" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="3">BIODEGRADABLE ENERGY</text>

  <!-- Title -->
  <text x="80" y="210" fill="white" font-size="80" font-weight="800" letter-spacing="-2">MykoVolt</text>

  <!-- Accent line -->
  <rect x="80" y="238" width="80" height="4" rx="2" fill="url(#accentLine)"/>

  <!-- Subtitle -->
  <text x="80" y="290" fill="#D8F3DC" font-size="32" font-weight="500" letter-spacing="-0.5">The Fungal Battery for</text>
  <text x="80" y="330" fill="white" font-size="34" font-weight="700" letter-spacing="-0.5">Precision Agriculture</text>

  <!-- Description -->
  <text x="80" y="385" fill="#B7E4C7" font-size="18" font-weight="400" opacity="0.8">Biodegradable soil moisture sensors powered</text>
  <text x="80" y="410" fill="#B7E4C7" font-size="18" font-weight="400" opacity="0.8">by fungal microbial fuel cells — no e-waste.</text>

  <!-- Stats row -->
  <g transform="translate(80, 460)">
    <rect x="0" y="0" width="120" height="80" rx="12" fill="#2D6A4F" fill-opacity="0.4" stroke="#52B788" stroke-opacity="0.25" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="60" y="35" fill="#D4FC79" font-size="30" font-weight="700" text-anchor="middle">7</text>
    <text x="60" y="60" fill="#B7E4C7" font-size="13" font-weight="500" text-anchor="middle">Days Runtime</text>

    <rect x="140" y="0" width="120" height="80" rx="12" fill="#2D6A4F" fill-opacity="0.4" stroke="#52B788" stroke-opacity="0.25" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="200" y="35" fill="#D4FC79" font-size="30" font-weight="700" text-anchor="middle">90%</text>
    <text x="200" y="60" fill="#B7E4C7" font-size="13" font-weight="500" text-anchor="middle">Compostable</text>

    <rect x="280" y="0" width="120" height="80" rx="12" fill="#2D6A4F" fill-opacity="0.4" stroke="#52B788" stroke-opacity="0.25" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="340" y="35" fill="#D4FC79" font-size="30" font-weight="700" text-anchor="middle">€0.15</text>
    <text x="340" y="60" fill="#B7E4C7" font-size="13" font-weight="500" text-anchor="middle">per Pellet</text>
  </g>

  <!-- ═══════ RIGHT: Sensor Illustration ═══════ -->

  <g transform="translate(190, 0)">
    <!-- Sensor body -->
    <rect x="510" y="150" width="180" height="330" rx="20" fill="#3E2723" stroke="#5D4037" stroke-width="1.5" filter="url(#cardShadow)"/>

    <!-- Soil texture -->
    <g clip-path="url(#sensorClip)" opacity="0.12">
      <circle cx="540" cy="180" r="5" fill="#A1887F"/>
      <circle cx="580" cy="210" r="4" fill="#8D6E63"/>
      <circle cx="650" cy="190" r="4.5" fill="#A1887F"/>
      <circle cx="550" cy="270" r="3.5" fill="#8D6E63"/>
      <circle cx="630" cy="250" r="5" fill="#A1887F"/>
      <circle cx="670" cy="320" r="3" fill="#8D6E63"/>
      <circle cx="540" cy="350" r="4" fill="#A1887F"/>
      <circle cx="600" cy="380" r="4.5" fill="#8D6E63"/>
      <circle cx="660" cy="410" r="3.5" fill="#A1887F"/>
      <circle cx="570" cy="440" r="4" fill="#8D6E63"/>
    </g>

    <!-- Mycelium network -->
    <g opacity="0.4" stroke="#95D5B2" fill="none" clip-path="url(#sensorClip)">
      <path d="M530,180 Q560,210 590,190 Q620,170 640,200 Q660,230 650,260 Q640,290 610,310 Q580,330 560,320 Q540,310 530,280 Q520,250 530,220 Z" stroke-width="2"/>
      <path d="M550,210 Q580,240 610,220 Q640,200 660,230 Q670,260 650,290 Q630,320 600,330" stroke-width="1.5"/>
      <path d="M570,270 Q600,290 630,280 Q660,270 670,300" stroke-width="1.2"/>
      <path d="M540,320 Q570,340 600,330 Q630,320 650,350" stroke-width="1.2"/>
      <path d="M560,370 Q590,390 620,380 Q640,370 660,390" stroke-width="1"/>
    </g>

    <!-- Fungal cells -->
    <g clip-path="url(#sensorClip)" opacity="0.5">
      <circle cx="560" cy="200" r="7" fill="#95D5B2" opacity="0.5"/>
      <circle cx="560" cy="200" r="3.5" fill="#B7E4C7" opacity="0.7"/>
      <circle cx="610" cy="230" r="6" fill="#95D5B2" opacity="0.5"/>
      <circle cx="610" cy="230" r="3" fill="#B7E4C7" opacity="0.7"/>
      <circle cx="650" cy="280" r="8" fill="#95D5B2" opacity="0.5"/>
      <circle cx="650" cy="280" r="4" fill="#B7E4C7" opacity="0.7"/>
      <circle cx="590" cy="310" r="6" fill="#95D5B2" opacity="0.5"/>
      <circle cx="590" cy="310" r="3" fill="#B7E4C7" opacity="0.7"/>
      <circle cx="540" cy="280" r="7" fill="#95D5B2" opacity="0.5"/>
      <circle cx="540" cy="280" r="3.5" fill="#B7E4C7" opacity="0.7"/>
      <circle cx="630" cy="350" r="6" fill="#95D5B2" opacity="0.5"/>
      <circle cx="630" cy="350" r="3" fill="#B7E4C7" opacity="0.7"/>
    </g>

    <!-- Internal PCB -->
    <rect x="545" y="260" width="110" height="80" rx="10" fill="#1B5E20" opacity="0.25"/>
    <rect x="575" y="280" width="25" height="18" rx="3" fill="#263238" opacity="0.4"/>

    <!-- Electrode traces -->
    <g opacity="0.2">
      <rect x="555" y="275" width="3" height="30" rx="1" fill="#FFC107"/>
      <rect x="565" y="278" width="3" height="24" rx="1" fill="#FFC107"/>
      <rect x="642" y="275" width="3" height="30" rx="1" fill="#FFC107"/>
      <rect x="652" y="278" width="3" height="24" rx="1" fill="#FFC107"/>
    </g>

    <!-- Live indicator -->
    <circle cx="530" cy="175" r="5" fill="#52B788" filter="url(#glow)"/>
    <text x="543" y="179" fill="#95D5B2" font-size="11" font-weight="600" opacity="0.8">LIVE</text>

    <!-- Compostable badge -->
    <rect x="545" y="440" width="110" height="22" rx="11" fill="#52B788" opacity="0.85"/>
    <text x="600" y="456" fill="white" font-size="11" text-anchor="middle" font-weight="700">100% COMPOSTABLE</text>

    <!-- Signal waves -->
    <g fill="none" stroke="#52B788" stroke-width="2" opacity="0.35">
      <path d="M700,250 Q720,230 700,210"/>
      <path d="M710,270 Q740,240 710,210">
        <animate attributeName="opacity" values="0.35;0.1;0.35" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M720,290 Q760,250 720,210"/>
    </g>
    <text x="740" y="205" fill="#74C69D" font-size="13" opacity="0.6">NFC</text>
  </g>

  <!-- Bottom tagline -->
  <rect x="0" y="590" width="1200" height="40" fill="#0D2818" opacity="0.4"/>
  <text x="600" y="615" fill="#74C69D" font-size="14" text-anchor="middle" letter-spacing="4" opacity="0.7">TRL 2 · RESEARCH PHASE · FUNGAL MICROBIAL FUEL CELL</text>
</svg>
